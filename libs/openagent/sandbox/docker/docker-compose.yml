# Docker Compose for OpenAgent Computer Environment
# Usage: docker-compose up -d

services:
  openagent-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openagent-sandbox
    
    # Mount points (customize paths as needed)
    volumes:
      # Agent Skills
      - ../mounts/skills:/mnt/skills:ro
      # User uploads
      - ../mounts/uploads:/mnt/uploads:ro
      # Agent outputs
      - ../mounts/outputs:/mnt/outputs
    
    # Environment variables
    environment:
      - DEBIAN_FRONTEND=noninteractive
      - PYTHONUNBUFFERED=1
      - IS_SANDBOX=yes
      - PIP_ROOT_USER_ACTION=ignore
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    
    # Security options (optional - for more isolation)
    # security_opt:
    #   - no-new-privileges:true
    # read_only: true
    # tmpfs:
    #   - /tmp:size=1G

  # Optional: Add gVisor runtime for extra sandboxing
  # Requires gVisor to be installed on host
  # openagent-sandboxed:
  #   extends: openagent-sandbox
  #   runtime: runsc